name: exoclaw agent
description: Run the exoclaw AI agent in response to GitHub events
author: Clause-Logic

inputs:
  model:
    description: >
      LLM model to use. Defaults to github/gpt-4.1-mini which uses your
      GITHUB_TOKEN — no extra secrets needed. To use Anthropic or OpenAI,
      set e.g. claude-sonnet-4-5 or gpt-4o and provide the relevant API key secret.
    required: false
    default: github/gpt-4.1-mini
  trigger:
    description: Word that must appear in comments to trigger the bot. Empty string = respond to all.
    required: false
    default: "@exoclawbot"
  respond_to_issues_opened:
    description: Respond when an issue is opened
    required: false
    default: "true"
  respond_to_prs_opened:
    description: Respond when a PR is opened
    required: false
    default: "false"
  python_version:
    description: Python version to use
    required: false
    default: "3.11"
  tools:
    description: >
      Comma-separated list of GitHub tools to enable. Workspace tools (read/write/exec)
      are always on. Available: github_review, github_label, github_pr_diff, github_issue,
      github_reaction, github_file, github_checks, github_search.
      Default: none enabled.
    required: false
    default: ""
  package_version:
    description: exoclaw-github version to install (default latest)
    required: false
    default: ""

branding:
  icon: zap
  color: purple

runs:
  using: composite
  steps:
    - name: Restore bot state
      shell: bash
      run: |
        git clone --branch bot-state --depth 1 \
          https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git \
          ~/.nanobot/workspace 2>/dev/null || {
            mkdir -p ~/.nanobot/workspace
            cd ~/.nanobot/workspace
            git init
            git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            git checkout --orphan bot-state
          }

    - name: Copy soul file
      shell: bash
      run: |
        if [ -f .bot/soul.md ]; then
          cp .bot/soul.md ~/.nanobot/workspace/soul.md
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install exoclaw-github
      shell: bash
      run: |
        if [ -n "${{ inputs.package_version }}" ]; then
          pip install "exoclaw-github==${{ inputs.package_version }}"
        else
          pip install exoclaw-github
        fi

    - name: Run agent
      shell: bash
      run: python -m exoclaw_github
      env:
        EXOCLAW_MODEL: ${{ inputs.model }}
        EXOCLAW_TRIGGER: ${{ inputs.trigger }}
        EXOCLAW_TOOLS: ${{ inputs.tools }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_API_KEY: ${{ github.token }}

    - name: Save bot state
      if: always()
      shell: bash
      run: |
        cd ~/.nanobot/workspace
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add -A
        git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
        git push origin bot-state
