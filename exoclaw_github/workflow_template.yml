# Drop this file into .github/workflows/exoclaw.yml in your repo.
#
# Required secrets:
#   ANTHROPIC_API_KEY  (or OPENAI_API_KEY / GEMINI_API_KEY / etc.)
#
# Optional: create .bot/soul.md in your repo to give the bot a personality.

name: exoclaw

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      message:
        description: "Message to send to the agent"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run exoclaw
        uses: Clause-Logic/exoclaw-github@main
        with:
          model: claude-sonnet-4-5
          # trigger: "@exoclaw"          # default — set to "" to respond to all comments
          # respond_to_prs_opened: "true"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
